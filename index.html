<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#12123f">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Космоматика">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;1000&family=Playpen+Sans:wght@400;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="apple-touch-startup-image" href="splash/splash-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
<link rel="apple-touch-startup-image" href="splash/splash-1668x2388.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
<link rel="apple-touch-startup-image" href="splash/splash-1620x2160.png" media="(device-width: 810px) and (device-height: 1080px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
<link rel="apple-touch-startup-image" href="splash/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
<link rel="apple-touch-startup-image" href="splash/splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
<link rel="apple-touch-startup-image" href="splash/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<title>Космоматематика 🚀</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      touch-action:manipulation; }
  :root {
    --violet:#7c5cff; --violet-deep:#5a34c9; --gold:#ffc94d; --gold-deep:#ff9f40;
    --ink:#3a3552; --ink-soft:#7d74a0;
    --ease-enter:cubic-bezier(.22,1,.36,1);
  }
  button, .node, .visual, h1, h2 { user-select:none; -webkit-user-select:none; }
  html,body { height:100%; }
  body {
    font-family:'Nunito','Segoe UI','Comic Sans MS',sans-serif; font-weight:600;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    background:#12123f;
    color:#fff; min-height:100vh; overflow-x:hidden;
  }
  /* display type: heavy rounded Nunito; Playpen keeps the characters' voice */
  h1, h2, .btn-next, .practice-all, .opt, .key, .daily-claim, .char-title, .gc-name,
  .intro-world, .complete h2, .streak-num, .streak-cap, .bubble .who,
  .rank-pill, .class-pill, .npc-pill, .streak-chip, .gc-num
  { font-family:'Nunito',sans-serif; font-weight:1000; letter-spacing:.2px; }
  .dlg-text, .gc-desc { font-family:'Playpen Sans','Nunito',sans-serif; }
  /* fixed, non-scrolling gradient + soft nebula glows (reliable on iOS too) */
  body::before {
    content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(640px 420px at 12% 15%, rgba(255,107,157,.16), transparent 70%),
      radial-gradient(720px 520px at 88% 75%, rgba(107,181,255,.13), transparent 70%),
      radial-gradient(560px 440px at 78% 10%, rgba(200,139,255,.15), transparent 70%),
      linear-gradient(180deg,#0d0b30 0%,#2a1763 55%,#3d2380 100%);
  }
  /* parallax star field: 3 fixed layers, subtle drift + scroll parallax */
  .star-layer { position:fixed; top:0; left:0; width:100%; height:160vh;
    pointer-events:none; z-index:0; will-change:transform; }
  .star-drift { position:absolute; inset:0;
    animation:drift ease-in-out infinite alternate; }
  @keyframes drift { from{transform:translate(0,0);} to{transform:translate(-24px,30px);} }
  .bg-star { position:absolute; border-radius:50%; background:#fff; opacity:.6;
    animation:twinkle 3s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.15;} 50%{opacity:.8;} }
  .shoot {
    position:absolute; width:90px; height:2px; border-radius:2px;
    background:linear-gradient(90deg, rgba(255,255,255,.95), transparent);
    opacity:0; animation:shoot linear infinite;
  }
  @keyframes shoot {
    0%   { opacity:0; transform:rotate(135deg) translateX(0); }
    1%   { opacity:.9; }
    9%   { opacity:0; transform:rotate(135deg) translateX(65vh); }
    100% { opacity:0; transform:rotate(135deg) translateX(65vh); }
  }

  #app { position:relative; z-index:1; max-width:560px; margin:0 auto;
    padding:calc(12px + env(safe-area-inset-top)) 14px calc(100px + env(safe-area-inset-bottom)); }
  /* gentle screen-to-screen continuity */
  #app.screen-in { animation:screenIn .32s var(--ease-enter); }
  @keyframes screenIn { from { opacity:0; transform:translateY(10px); } }

  /* ---------- header ---------- */
  .hero {
    position:sticky; top:calc(8px + env(safe-area-inset-top)); z-index:60;
    background:linear-gradient(160deg, rgba(60,44,130,.92), rgba(40,28,96,.88));
    border:1px solid rgba(255,255,255,.18);
    border-radius:26px; padding:16px; display:flex; gap:16px; align-items:flex-start;
    backdrop-filter:blur(12px); margin-bottom:22px;
    box-shadow:0 16px 40px rgba(0,0,0,.35), 0 0 60px rgba(120,80,230,.15),
      inset 0 1px 0 rgba(255,255,255,.14);
    transition:padding .25s;
  }
  /* compact sticky mode while scrolling */
  .hero.mini { padding:8px 14px; gap:12px; align-items:center; cursor:pointer; }
  .hero.mini .avatar3d { width:58px; height:58px; border-radius:14px; }
  .hero.mini .rank, .hero.mini .xprow { display:none; }
  .hero.mini h1 { font-size:20px; }
  .hero.mini .xpbar { margin-top:4px; }
  /* bordered rounded avatar (opaque 3d art, head crop), square, tappable */
  .avatar3d {
    flex-shrink:0; width:116px; height:116px; cursor:pointer;
    border-radius:22px; border:2px solid rgba(160,120,255,.45);
    background-size:165%; background-position:50% 10%; background-repeat:no-repeat;
    background-color:#f2eef6;
    box-shadow:0 10px 24px rgba(0,0,0,.4), 0 0 20px rgba(120,80,230,.25);
    transition:transform .12s, width .25s, height .25s, border-radius .25s;
  }
  .avatar3d:active { transform:scale(.95); }
  .avatar3d.girl { border-color:rgba(255,158,207,.55);
    box-shadow:0 10px 24px rgba(0,0,0,.4), 0 0 20px rgba(255,130,190,.3); }
  .hero-info { flex:1; min-width:0; }
  .rank-pill {
    display:inline-flex; align-items:center; gap:5px; vertical-align:middle;
    background:linear-gradient(180deg,#6a3fe0,#5a34c9); color:#fff;
    padding:3px 13px; border-radius:999px; font-size:13px; font-weight:bold;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.28), 0 3px 8px rgba(0,0,0,.25);
  }
  .xprow { display:flex; justify-content:space-between; align-items:baseline; gap:10px;
    font-size:12px; margin:10px 0 6px; opacity:.92; }
  .char-full { width:100%; max-width:150px; height:auto; display:block; margin:0 auto 8px;
    border-radius:18px; border:2px solid rgba(255,255,255,.3);
    box-shadow:0 8px 20px rgba(0,0,0,.35); }
  .speaker-img { width:130px; height:130px; display:block; margin:10px auto 4px; animation:pop .4s;
    border-radius:22px; border:2px solid rgba(255,255,255,.35);
    box-shadow:0 10px 24px rgba(0,0,0,.4); object-fit:cover; }
  .rankup-img { width:150px; height:150px; display:block; margin:4px auto;
    border-radius:20px; border:2px solid #ffd76e; object-fit:cover;
    box-shadow:0 8px 20px rgba(255,179,64,.3); }
  .name-row { display:flex; justify-content:space-between; align-items:baseline;
    gap:10px; padding-right:36px; }
  .hero h1 { font-size:26px; margin-bottom:0; text-shadow:0 2px 8px rgba(0,0,0,.4); }
  .starcount { font-size:15px; white-space:nowrap; }
  .rank { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
  .class-pill {
    display:inline-flex; align-items:center; color:#fff;
    padding:3px 13px; border-radius:999px; font-size:13px; font-weight:bold;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.28), 0 3px 8px rgba(0,0,0,.25);
  }
  .class-pill.girl { background:linear-gradient(180deg,#ff9ecf,#d94f92); }
  .class-pill.boy  { background:linear-gradient(180deg,#7d8cff,#5560e0); }

  /* ---------- character game card modal ---------- */
  .card-overlay {
    position:fixed; inset:0; z-index:90; padding:20px;
    background:rgba(8,6,30,.72); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    animation:fadeIn .2s;
  }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  .game-card {
    position:relative; width:100%; max-width:330px; border-radius:28px; padding:10px;
    background:linear-gradient(160deg,#8f6bff,#5a34c9 55%,#3d2380);
    box-shadow:0 30px 70px rgba(0,0,0,.6), 0 0 50px rgba(120,80,230,.35),
      inset 0 1px 0 rgba(255,255,255,.35);
    animation:pop .35s;
  }
  .game-card.girl { background:linear-gradient(160deg,#ff9ecf,#e2569b 55%,#8f2d63);
    box-shadow:0 30px 70px rgba(0,0,0,.6), 0 0 50px rgba(255,120,190,.35),
      inset 0 1px 0 rgba(255,255,255,.35); }
  .gc-inner { background:linear-gradient(180deg,#ffffff,#f4f0ff); border-radius:20px;
    padding:12px 12px 8px; color:#333; }
  .gc-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .gc-class { background:#efe9ff; color:#6a3fd4; font-weight:bold; font-size:13px;
    padding:4px 14px; border-radius:999px; box-shadow:inset 0 1px 0 #fff; }
  .game-card.girl .gc-class { background:#ffe4f1; color:#c2417e; }
  .gc-num { font-weight:bold; font-size:14px; color:#b0a8c8; letter-spacing:1px; }
  .gc-art {
    position:relative; aspect-ratio:1/1; border-radius:16px; border:2px solid #e6ddff;
    background-size:cover; background-position:center;
    box-shadow:inset 0 0 30px rgba(143,107,255,.15);
  }
  .gc-name {
    position:absolute; bottom:-16px; left:50%; transform:translateX(-50%);
    background:linear-gradient(180deg,#ffd76e,#ffb340); color:#5a2d00;
    padding:5px 24px; border-radius:14px; font-weight:bold; font-size:22px;
    box-shadow:0 4px 0 #d97b1e, 0 8px 16px rgba(0,0,0,.25); white-space:nowrap;
  }
  .gc-rows { margin-top:26px; }
  .gc-row { display:flex; justify-content:space-between; align-items:center;
    padding:7px 4px; border-top:1px solid #ece5ff; font-size:14px; }
  .gc-row .lbl { color:#9a90bd; font-weight:bold; font-size:11px; letter-spacing:.5px;
    display:flex; gap:6px; align-items:center; text-transform:uppercase; }
  .gc-row .val { font-weight:bold; color:#4a3f70; }
  .gc-desc { font-size:13px; color:#7d74a0; font-style:italic; text-align:center;
    padding:10px 10px 6px; line-height:1.5; }
  .gc-close {
    position:absolute; top:-13px; right:-13px; width:42px; height:42px; border-radius:50%;
    background:#fff; color:#5a34c9; border:none; font-size:18px; cursor:pointer;
    box-shadow:0 6px 16px rgba(0,0,0,.45); font-family:inherit; font-weight:bold;
  }

  /* ---------- hidden dev/test menu ---------- */
  .dev-panel {
    position:relative; width:100%; max-width:320px; border-radius:22px; padding:18px 16px 14px;
    background:#1d1650; border:1px solid rgba(255,255,255,.3); color:#fff;
    box-shadow:0 24px 60px rgba(0,0,0,.6); animation:pop .25s;
  }
  .dev-panel h3 { text-align:center; font-size:18px; margin-bottom:4px; }
  .dev-status { text-align:center; font-size:13px; opacity:.8; margin-bottom:12px; }
  .dev-btn {
    display:block; width:100%; margin:7px 0; padding:11px 14px; text-align:left;
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); border-radius:14px;
    color:#fff; font-family:inherit; font-size:14px; cursor:pointer;
  }
  .dev-btn:active { background:rgba(255,255,255,.22); }
  .dev-btn.danger { border-color:rgba(255,120,120,.45); color:#ff9d9d; }

  /* ---------- daily mission & streak card ---------- */
  .daily {
    display:flex; align-items:center; gap:12px; margin-bottom:22px; padding:12px 14px;
    background:linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
    border:1px solid rgba(255,255,255,.18); border-radius:20px;
    box-shadow:0 12px 28px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .streak-chip {
    flex-shrink:0; display:flex; align-items:center; gap:3px; cursor:pointer;
    background:linear-gradient(180deg,#ff9f40,#e0662f); color:#fff; border:none;
    font-family:inherit;
    padding:7px 13px; border-radius:999px; font-size:15px; font-weight:bold;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.3), 0 4px 12px rgba(224,102,47,.4);
    transition:transform .12s;
  }
  .streak-chip:active { transform:scale(.93); }
  .streak-chip.off { background:rgba(255,255,255,.12); box-shadow:none; opacity:.7; }

  /* streak modal */
  .streak-panel {
    position:relative; width:100%; max-width:330px; border-radius:24px;
    padding:26px 20px 18px; text-align:center;
    background:#1d1650; border:1px solid rgba(255,255,255,.3); color:#fff;
    box-shadow:0 24px 60px rgba(0,0,0,.6), 0 0 60px rgba(255,159,64,.15);
    animation:pop .3s;
  }
  .streak-flame { font-size:64px; line-height:1;
    filter:drop-shadow(0 6px 20px rgba(255,159,64,.55)); animation:dlgBob 1.6s ease-in-out infinite; }
  .streak-num { font-size:46px; font-weight:bold; margin-top:-6px;
    text-shadow:0 3px 12px rgba(0,0,0,.4); }
  .streak-cap { color:#ffd76e; font-weight:bold; font-size:19px; margin-top:-4px; }
  .week {
    display:flex; gap:4px; margin:18px 0 12px; padding:12px 8px;
    background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.15); border-radius:18px;
  }
  .wd { flex:1; text-align:center; }
  .wd .lbl { font-size:11px; opacity:.75; }
  .wd.today .lbl { color:#ffd76e; font-weight:bold; opacity:1; }
  .wd .c {
    width:27px; height:27px; margin:6px auto 0; border-radius:50%;
    background:rgba(255,255,255,.13); display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:bold; color:#fff;
  }
  .wd .c.done { background:linear-gradient(180deg,#ffb340,#e0662f);
    box-shadow:0 3px 8px rgba(224,102,47,.4); }
  .wd .c.now { border:2px dashed rgba(255,215,110,.6); }
  .streak-desc { font-size:13.5px; line-height:1.5; opacity:.85; padding:0 4px; }
  .streak-desc b { color:#ffd76e; }
  .streak-best { margin-top:10px; font-size:14px; font-weight:bold; opacity:.9; }
  .daily-mid { flex:1; min-width:0; }
  .daily-title { font-size:11px; text-transform:uppercase; letter-spacing:.5px; opacity:.7; }
  .daily-text { font-size:14px; font-weight:bold; margin:2px 0 6px; }
  .daily-bar { height:8px; background:rgba(0,0,0,.35); border-radius:6px; overflow:hidden;
    border:1px solid rgba(255,255,255,.08); }
  .daily-bar > div { height:100%; background:linear-gradient(90deg,#6ee7a0,#2fd573);
    border-radius:6px; transition:width .4s; box-shadow:0 0 8px rgba(47,213,115,.5); }
  .daily-count { flex-shrink:0; font-size:14px; font-weight:bold; opacity:.85; }
  .daily-done { flex-shrink:0; font-size:22px; }
  .daily-claim {
    flex-shrink:0; padding:10px 16px; border:none; border-radius:16px; cursor:pointer;
    font-family:inherit; font-size:15px; font-weight:bold; color:#5a2d00;
    background:linear-gradient(180deg,#ffd76e,#ffb340);
    box-shadow:0 4px 0 #d97b1e, 0 8px 18px rgba(255,179,64,.4), inset 0 1px 0 rgba(255,255,255,.5);
    animation:claimPulse 1.6s ease-in-out infinite;
  }
  @keyframes claimPulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.07); } }

  /* ---------- floating sound + bottom nav ---------- */
  .sound-fab {
    position:fixed; top:calc(10px + env(safe-area-inset-top)); right:12px; z-index:70;
    width:44px; height:44px; border-radius:50%; border:1px solid rgba(255,255,255,.22);
    font-size:19px; cursor:pointer; color:#fff;
    background:rgba(30,24,80,.6); backdrop-filter:blur(12px);
    box-shadow:0 8px 20px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.15);
  }
  .bottomnav {
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(10px + env(safe-area-inset-bottom)); z-index:70;
    display:flex; gap:4px; padding:7px 9px;
    background:rgba(22,16,64,.72); backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.20); border-radius:28px;
    box-shadow:0 16px 36px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.14);
  }
  .nav-btn {
    background:none; border:none; color:#fff; font-family:inherit; font-weight:800; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:11px; padding:6px 12px; border-radius:18px; opacity:.7;
    transition:opacity .2s, background .2s;
  }
  .nav-btn .ic { font-size:22px; line-height:1; height:26px; display:flex; align-items:center;
    transition:transform .25s var(--ease-enter); }
  .nav-btn .ic svg { width:22px; height:22px; }
  .nav-btn.active { opacity:1; background:rgba(255,255,255,.14); color:#ffd76e; }
  .nav-btn.active .ic { transform:translateY(-2px) scale(1.12); }
  .sound-fab { display:flex; align-items:center; justify-content:center; }
  .sound-fab svg { width:20px; height:20px; }
  .nav-avatar {
    width:26px; height:26px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:16px;
    background:radial-gradient(circle at 30% 30%,#ffd76e,#ff9040);
  }
  .nav-avatar.girl { background:radial-gradient(circle at 30% 30%,#ff9ecf,#d94f92); }
  .nav-avatar.img { background-color:#fff; background-size:165%; background-position:50% 10%;
    background-repeat:no-repeat; font-size:0; }

  /* ---------- practice & achievements ---------- */
  .practice-all {
    display:block; margin:16px auto; padding:16px 36px; font-size:20px; font-family:inherit;
    font-weight:bold; border:none; border-radius:22px; cursor:pointer; color:#fff;
    background:linear-gradient(180deg,#5fe19a,#1faf62);
    box-shadow:0 6px 0 #12824a, 0 14px 28px rgba(31,175,98,.35), inset 0 1px 0 rgba(255,255,255,.45);
  }
  .practice-all:active { transform:translateY(4px); box-shadow:0 2px 0 #12824a; }
  .topic-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:14px; }
  .topic {
    background:linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
    border:1px solid rgba(255,255,255,.22); border-radius:16px;
    padding:10px 14px; cursor:pointer; color:#fff; font-family:inherit; font-size:14px;
    box-shadow:0 8px 20px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .topic:active { background:rgba(255,255,255,.2); }
  .topic.sel { border-color:#ffd76e; background:rgba(255,215,110,.18);
    box-shadow:0 0 14px rgba(255,215,110,.35); }
  .topic .w { opacity:.7; font-size:12px; display:block; }
  .ach-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:14px; }
  .ach-card {
    position:relative; text-align:center; padding:14px 8px 12px; border-radius:20px;
    background:linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 10px 24px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .ach-card img, .ach-fallback {
    width:64px; height:64px; display:block; margin:0 auto 8px;
    border-radius:50%; object-fit:cover;
  }
  .ach-fallback { font-size:38px; line-height:64px; text-align:center;
    background:rgba(255,255,255,.12); }
  .ach-card .an { font-size:12.5px; font-weight:1000; line-height:1.2; }
  .ach-card .ad { font-size:10.5px; opacity:.7; line-height:1.3; margin-top:3px; }
  .ach-card.locked { filter:grayscale(.85); opacity:.55; }
  .ach-card.locked::after { content:'🔒'; position:absolute; top:8px; right:9px; font-size:14px; }
  .xpbar { height:13px; background:rgba(0,0,0,.4); border-radius:8px; overflow:hidden;
    border:1px solid rgba(255,255,255,.10); box-shadow:inset 0 2px 4px rgba(0,0,0,.4); }
  .xpbar > div { height:100%; background:linear-gradient(90deg,#6ee7a0,#2fd573); border-radius:8px;
    transition:width .6s; box-shadow:inset 0 1px 0 rgba(255,255,255,.45), 0 0 10px rgba(47,213,115,.6);
    position:relative; overflow:hidden; }
  .xpbar > div::after {   /* periodic shine sweep */
    content:''; position:absolute; inset:0;
    background:linear-gradient(110deg, transparent 30%, rgba(255,255,255,.55) 50%, transparent 70%);

  }

  .xptext { font-size:11px; opacity:.85; margin-top:3px; }
  .starcount { font-size:15px; margin-top:4px; }

  /* ---------- worlds ---------- */
  .world {

  .npc-pill.gone { filter:grayscale(.75); opacity:.6; text-decoration:line-through; }
  .fly-away, .intro-scene .speaker.fly-away, .intro-scene .speaker-npc.fly-away {

    animation:flyAway 2s ease-in forwards !important; }
  @keyframes flyAway {

  .world-gate { font-size:15px; color:#ffd76e; margin-top:4px; }
  .deco { position:absolute; font-size:24px; opacity:.35; z-index:0; pointer-events:none; }
  .world-locked-body { text-align:center; padding:20px 12px 26px; position:relative; z-index:2; }
  .world-locked-body .lock { font-size:52px; display:block; margin-bottom:6px; }

  /* ---------- level path ---------- */
  .map { position:relative; }
  .connector {   /* solid link between world cards */

    background:linear-gradient(180deg, rgba(255,255,255,.38), rgba(255,255,255,.22));
    box-shadow:0 0 8px rgba(255,255,255,.15);
  }
  .path { position:relative; padding:14px 0 26px; z-index:1; }
  .path::before {   /* subtle solid trail between levels inside a world */
    content:''; position:absolute; top:10px; bottom:20px; left:50%;
    border-left:4px solid rgba(255,255,255,.14); transform:translateX(-2px); border-radius:2px;
  }
  .node-row { position:relative; display:flex; justify-content:center; margin:26px 0; }
  .node-row:nth-child(odd)  { transform:translateX(-70px); }
  .node-row:nth-child(even) { transform:translateX(70px); }
  .node {
    width:92px; height:92px; border-radius:50%; cursor:pointer;
    border:2px solid rgba(255,255,255,.22);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:inherit; font-size:32px; color:#fff; position:relative;
    background:radial-gradient(circle at 30% 25%,#8f6bff,#5a34c9);

    transition:transform .15s;
  }
  .node:active { transform:translateY(4px); box-shadow:0 4px 0 #3c1f8f; }
  .node.done { background:radial-gradient(circle at 30% 25%,#5fe19a,#1faf62); box-shadow:0 8px 0 #12824a, 0 14px 28px rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.3); }
  .node.locked { background:radial-gradient(circle at 30% 25%,#9a9ab0,#5c5c74); box-shadow:0 8px 0 #44445a; cursor:not-allowed; filter:saturate(.4); }
  .node.current { box-shadow:0 8px 0 #3c1f8f, 0 14px 28px rgba(0,0,0,.45),
    0 0 26px rgba(255,215,110,.5), inset 0 2px 3px rgba(255,255,255,.3); }
  .node.current::after {
    content:''; position:absolute; inset:-10px; border-radius:50%;
    border:3px solid rgba(255,215,110,.65); animation:pulseRing 2s ease-out infinite;
  }
  @keyframes pulseRing {
    0% { transform:scale(.88); opacity:.9; }
    70% { transform:scale(1.12); opacity:0; }
    100% { opacity:0; }
  }
  .node .stars { font-size:12px; letter-spacing:1px; margin-top:-2px; }
  .node-label {
    position:absolute; top:100px; left:50%; transform:translateX(-50%);
    width:150px; text-align:center; font-size:13px; line-height:1.25; color:#fff;
    text-shadow:0 2px 4px rgba(0,0,0,.7);
  }
  .rocket-marker { position:absolute; top:-34px; left:50%; transform:translateX(-50%); font-size:26px;
    animation:bob 1.6s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translate(-50%,0);} 50%{transform:translate(-50%,-7px);} }

  .reset { display:block; margin:24px auto 0; background:none; border:none; color:rgba(255,255,255,.65);
    font-family:inherit; font-size:12px; cursor:pointer; text-decoration:underline; }
  .legal { text-align:center; margin-top:14px; font-size:11px; color:rgba(255,255,255,.55); }
  .legal a { color:rgba(255,255,255,.7); }

  /* ---------- character screen ---------- */
  .char-title { text-align:center; font-size:24px; margin:14px 0 4px; color:#ffd76e; }
  .char-sub { text-align:center; font-size:15px; opacity:.85; margin:16px 0 10px; }
  .char-cards { display:flex; gap:14px; justify-content:center; margin:18px 0; }
  .char-card {
    flex:1; max-width:180px;
    background:linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
    border:1px solid rgba(255,255,255,.22); border-radius:22px; padding:20px 10px;
    text-align:center; cursor:pointer; color:#fff; font-family:inherit; font-size:16px;
    box-shadow:0 12px 28px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .char-card .big { font-size:56px; display:block; margin-bottom:8px; }
  .char-card.sel { border-color:#ffd76e; background:rgba(255,215,110,.18);
    box-shadow:0 0 16px rgba(255,215,110,.4); }
  .name-input {
    width:100%; max-width:280px; display:block; margin:0 auto; padding:12px 16px;
    font-family:inherit; font-size:22px; font-weight:bold; text-align:center;
    border:3px solid #d6c9ff; border-radius:16px; color:#5a34c9; outline:none; background:#fff;
  }
  .name-input:focus { border-color:#8f6bff; box-shadow:0 0 0 4px rgba(143,107,255,.25); }
  .char-title { text-shadow:0 2px 12px rgba(255,215,110,.35); }

  /* ---------- world intro dialog ---------- */
  .intro-scene { text-align:center; padding:10px 0 0; }
  .intro-world { font-size:22px; color:#ffd76e; margin-bottom:10px; text-shadow:0 2px 6px rgba(0,0,0,.5); }
  .speaker { font-size:68px; display:block; margin:10px auto 4px; animation:pop .4s; }
  .bubble {
    position:relative; background:linear-gradient(180deg,#ffffff,#f6f3ff); color:var(--ink);
    border-radius:24px; padding:16px 20px; margin:16px auto 20px; max-width:420px;
    font-size:17px; line-height:1.48; text-align:left;
    box-shadow:0 16px 36px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.08);
  }
  .speaker { filter:drop-shadow(0 8px 14px rgba(0,0,0,.45)); }
  .bubble::before { content:''; position:absolute; top:-10px; left:50%; transform:translateX(-50%);
    border:10px solid transparent; border-bottom-color:#fff; border-top:none; }
  .bubble .who { font-weight:bold; color:#7a4fd4; display:block; margin-bottom:4px; }
  .bubble.villain .who { color:#c0392b; }
  .intro-dots { display:flex; gap:12px; justify-content:center; margin-top:16px; }
  .intro-dots i { width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.32); transition:.2s; }
  .intro-dots i.on { background:#fff; transform:scale(1.2); }

  /* dialog reveal effects (typewriter, talking, villain mode) */
  .intro-scene .speaker, .intro-scene .speaker-img { animation:popIn .4s var(--ease-enter) both; }
  .intro-scene .bubble { animation:bubbleIn .35s var(--ease-enter) .04s both; }
  @keyframes popIn { from { opacity:0; transform:translateY(12px) scale(.8); } }
  @keyframes bubbleIn { from { opacity:0; transform:translateY(14px) scale(.96); } }
  .speaker.talking { animation:dlgBob .5s ease-in-out infinite; }
  /* NPC portrait speaker */
  .speaker-npc {
    width:128px; height:128px; display:block; margin:0 auto; object-fit:cover;
    border-radius:28px; border:2px solid rgba(255,255,255,.4); background:#f4f2f7;
    box-shadow:0 14px 32px rgba(0,0,0,.45);
  }
  .intro-scene .speaker-npc { animation:popIn .4s var(--ease-enter) both; }
  .speaker-npc.talking { animation:dlgBob .5s ease-in-out infinite; }
  .intro-scene.evil .speaker-npc { border-color:rgba(224,73,47,.65);
    box-shadow:0 14px 32px rgba(0,0,0,.45), 0 0 34px rgba(224,73,47,.5); }
  .intro-scene.evil.revealing .speaker-npc { animation:dlgJitter .19s infinite; }
  /* NPC mini game-cards on the world map */
  .npc-cards { display:flex; gap:12px; justify-content:center; align-items:stretch;
    margin:12px 0 2px; position:relative; z-index:2; }
  .npc-card {
    width:132px; border-radius:18px; padding:9px 8px 8px; text-align:center;
    background:linear-gradient(180deg,#f1ebff,#e0d4ff); border:2px solid #c9b6ff;
    box-shadow:0 10px 22px rgba(0,0,0,.28), inset 0 1px 0 #fff;
    color:#5a34c9;
  }
  .npc-card img, .npc-card .npc-fallback {
    width:88px; height:88px; display:block; margin:0 auto 6px;
    border-radius:14px; object-fit:cover; background:#fff;
    box-shadow:0 4px 10px rgba(90,52,201,.18);
  }
  .npc-card .npc-fallback { font-size:52px; line-height:88px; text-align:center; }
  .npc-card .role { font-size:9.5px; font-weight:800; text-transform:uppercase;
    letter-spacing:.7px; opacity:.65; }
  .npc-card .nm { font-size:13px; font-weight:1000; line-height:1.2; }
  .npc-card.v { background:linear-gradient(180deg,#ffe9e3,#ffd6cc); border-color:#ffab9c;
    color:#c0392b; }
  .npc-card.v img { box-shadow:0 4px 10px rgba(192,57,43,.18); }
  .npc-card.gone { filter:grayscale(.75); opacity:.7; }
  .npc-vs { align-self:center; font-weight:1000; font-size:14px; color:#ffd76e;
    text-shadow:0 2px 6px rgba(0,0,0,.4); }
  @keyframes dlgBob { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
  .bubble .dlg-text { white-space:pre-wrap; min-height:2.9em; display:block; }
  .evilfx { position:fixed; inset:0; pointer-events:none; z-index:5; opacity:0; transition:opacity .35s;
    background:radial-gradient(ellipse at center, transparent 46%, rgba(150,12,12,.34) 100%); }
  .evilfx.on { opacity:1; }
  .intro-scene.evil .bubble { box-shadow:0 16px 36px rgba(0,0,0,.4), 0 0 42px rgba(224,73,47,.5); }
  .intro-scene.evil .speaker { filter:drop-shadow(0 8px 14px rgba(224,73,47,.6)); }
  .intro-scene.evil .bubble .dlg-text { color:#8a2a1c; }
  .intro-scene.evil.revealing .bubble { animation:dlgShake .25s infinite; }
  .intro-scene.evil.revealing .speaker { animation:dlgJitter .19s infinite; }
  .intro-scene.evil.revealing .btn-next { animation:dlgBtnShake .12s infinite; }
  @keyframes dlgShake { 0%,100%{transform:translate(0,0)} 20%{transform:translate(-2.5px,.8px)}
    40%{transform:translate(2.5px,-1.7px)} 60%{transform:translate(-1.7px,1.7px)} 80%{transform:translate(1.7px,-.8px)} }
  @keyframes dlgJitter { 0%,100%{transform:translate(0,0) rotate(0)} 25%{transform:translate(-2.5px,-1.7px) rotate(-3.4deg)}
    50%{transform:translate(2.5px,.8px) rotate(2.5deg)} 75%{transform:translate(-.8px,1.7px) rotate(-1.7deg)} }
  @keyframes dlgBtnShake { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-1.7px,.8px)}
    50%{transform:translate(1.7px,-.8px)} 75%{transform:translate(-.8px,-.8px)} }

  /* ---------- task screen ---------- */
  .topbar { display:flex; align-items:center; gap:12px; margin-bottom:18px; padding-right:52px; }
  .btn-close {
    background:rgba(30,24,80,.6); backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.22); color:#fff; width:42px; height:42px;
    border-radius:50%; font-size:19px; cursor:pointer; flex-shrink:0;
    box-shadow:0 8px 20px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.15);
  }
  .progress { flex:1; height:16px; background:rgba(0,0,0,.4); border-radius:10px; overflow:hidden;
    border:1px solid rgba(255,255,255,.10); box-shadow:inset 0 2px 4px rgba(0,0,0,.4); }
  .progress > div { height:100%; background:linear-gradient(90deg,#ffd76e,#ffb340);
    transition:width .4s; border-radius:10px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.5), 0 0 12px rgba(255,179,64,.6); }

  .card {
    position:relative;
    background:linear-gradient(180deg,#ffffff,#f6f3ff); color:#333;
    border-radius:28px; padding:24px 20px;
    box-shadow:0 24px 48px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.08);
  }
  .say-btn {
    position:absolute; top:10px; right:10px; width:46px; height:46px; z-index:2;
    border:none; border-radius:50%;
    background:linear-gradient(180deg,#faf8ff,#efe9ff); font-size:20px; cursor:pointer;
    box-shadow:0 3px 0 #d6c9ff, 0 6px 12px rgba(90,52,201,.15), inset 0 1px 0 #ffffff;
  }
  .say-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #d6c9ff; }
  .card .prompt { padding:0 34px; }
  .bubble { cursor:pointer; }
  .card.shake { animation:shake .4s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-10px);} 40%,80%{transform:translateX(10px);} }

  .prompt { font-size:18px; font-weight:700; color:var(--ink); line-height:1.45;
    margin-bottom:16px; text-align:center; }
  .prompt .villain { color:#c0392b; }
  .visual { text-align:center; font-size:32px; line-height:1.5; margin-bottom:18px; word-spacing:6px; }
  .visual .grp { display:inline-block; background:linear-gradient(180deg,#f6f2ff,#efe8ff);
    border:1px solid #e6ddff; border-radius:18px; padding:10px 14px; margin:4px; max-width:240px;
    box-shadow:inset 0 1px 0 #ffffff, 0 3px 8px rgba(90,52,201,.08); }
  .visual .op { font-size:36px; font-weight:bold; color:#7a4fd4; margin:0 6px; vertical-align:middle; }
  .visual .gone { filter:grayscale(1); opacity:.35; }
  /* pattern sequences: one strict row, ? exactly in the next position */
  .visual .seq-row {
    display:inline-flex; flex-wrap:nowrap; align-items:center; gap:5px;
    font-size:24px; max-width:none; word-spacing:0;
  }
  .visual .seq-row .gap { min-width:28px; font-size:26px; border-bottom-width:3px; }
  @media (min-width:420px){ .visual .seq-row { font-size:30px; gap:7px; } }
  .bignum { font-size:40px; font-weight:bold; color:#5a34c9; white-space:nowrap; }
  @media (max-width:420px){ .bignum { font-size:32px; } }
  .gap { display:inline-block; min-width:52px; border-bottom:4px solid #ffb340; color:#ff9040; font-size:40px; font-weight:bold; text-align:center; }
  .coin { display:inline-block; width:56px; height:56px; border-radius:50%; margin:4px;
    background:radial-gradient(circle at 32% 28%,#ffe9a8,#f0b429); border:3px solid #d99a1b;
    color:#7a5200; font-weight:bold; line-height:50px; font-size:24px; text-align:center; }

  .options { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
  .opt {
    min-width:72px; padding:14px 18px; font-size:26px; font-family:inherit; font-weight:bold;
    border:none; border-radius:18px; cursor:pointer; color:#fff;
    background:linear-gradient(180deg,#8f6bff,#6a3fe0);
    box-shadow:0 5px 0 #4a26a8, inset 0 1px 0 rgba(255,255,255,.35);
    transition:transform .1s;
  }
  .opt.txt { font-size:17px; }
  .opt:active { transform:translateY(3px); box-shadow:0 2px 0 #4a26a8; }
  .opt.wrong { background:linear-gradient(180deg,#c9c9d6,#a6a6ba); box-shadow:0 5px 0 #8b8ba0; pointer-events:none; }
  .opt.right { background:linear-gradient(180deg,#5fe19a,#1faf62);
    box-shadow:0 5px 0 #12824a, 0 0 18px rgba(95,225,154,.5);
    animation:popCorrect .38s var(--ease-enter); }
  @keyframes popCorrect { 0%{transform:scale(1)} 45%{transform:scale(1.12)} 100%{transform:scale(1)} }
  @media (hover:hover){
    .btn-next:hover, .opt:hover:not(.wrong), .key:hover, .practice-all:hover,
    .daily-claim:hover, .topic:hover { filter:brightness(1.06); }
    .node:not(.locked):hover { transform:translateY(-3px); }
  }

  .answer-display {
    text-align:center; font-size:42px; font-weight:bold; color:#5a34c9;
    min-height:58px; border-bottom:4px dashed #c9b8ff; margin:0 60px 16px; letter-spacing:4px;
    text-shadow:0 2px 6px rgba(90,52,201,.15);
  }
  .keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:280px; margin:0 auto; }
  .key {
    padding:14px 0; font-size:26px; font-family:inherit; font-weight:bold; border:none;
    border-radius:18px; cursor:pointer;
    background:linear-gradient(180deg,#faf8ff,#efe9ff); color:#5a34c9;
    box-shadow:0 4px 0 #d6c9ff, 0 6px 12px rgba(90,52,201,.12), inset 0 1px 0 #ffffff;
    transition:transform .1s;
  }
  .key:active { transform:translateY(3px); box-shadow:0 1px 0 #d6c9ff; }
  .key.act { background:linear-gradient(180deg,#5fe19a,#1faf62); color:#fff;
    box-shadow:0 4px 0 #12824a, 0 8px 16px rgba(31,175,98,.3), inset 0 1px 0 rgba(255,255,255,.45); }
  .key.del { background:linear-gradient(180deg,#fff0f0,#ffdede); color:#e05555;
    box-shadow:0 4px 0 #f5b8b8, inset 0 1px 0 #ffffff; }

  .feedback { text-align:center; font-size:20px; font-weight:bold; min-height:30px; margin-top:16px; }
  .feedback .fb-ava { width:44px; height:44px; border-radius:50%; object-fit:cover;
    vertical-align:middle; margin-right:8px; border:2px solid #fff;
    box-shadow:0 4px 10px rgba(0,0,0,.22); background:#f4f2f7; }
  .fb-ava.happy { animation:reactHappy .8s var(--ease-enter) both; }
  .fb-ava.angry { animation:reactAngry .7s both; }
  @keyframes reactHappy {
    0% { opacity:0; transform:translateY(16px) scale(.4); }
    35% { opacity:1; transform:translateY(-6px) scale(1.12); }
    60% { transform:translateY(0) scale(1); }
    100% { opacity:1; }
  }
  @keyframes reactAngry {
    0% { opacity:0; transform:scale(.4); }
    25% { opacity:1; transform:scale(1.05) rotate(-7deg); }
    45% { transform:rotate(7deg); }
    65% { transform:rotate(-4deg); }
    100% { opacity:1; transform:rotate(0); }
  }
  /* speaker icon in dialog name */
  .bubble .who .who-spk { display:inline-block; margin-left:6px; opacity:.55; }
  .bubble .who .who-spk svg { width:14px; height:14px; vertical-align:-2px; }
  /* hero mini avatar on the win screen */
  .win-ava { width:36px; height:36px; border-radius:12px; object-fit:cover;
    object-position:50% 12%; vertical-align:middle; margin:0 3px; background:#fff;
    box-shadow:0 3px 8px rgba(90,52,201,.25); }
  .feedback.good { color:#1faf62; }
  .feedback.bad  { color:#e05555; }

  .btn-next {
    display:block; margin:14px auto 0; padding:14px 44px; font-size:22px; font-family:inherit; font-weight:bold;
    border:none; border-radius:20px; cursor:pointer; color:#fff;
    background:linear-gradient(180deg,#ffd76e,#ff9f40);
    box-shadow:0 6px 0 #d97b1e, 0 12px 26px rgba(255,159,64,.35), inset 0 1px 0 rgba(255,255,255,.5);
  }
  .btn-next:active { transform:translateY(4px); box-shadow:0 2px 0 #d97b1e; }

  /* ---------- level complete ---------- */
  .complete { text-align:center; padding:40px 20px; }
  .complete .big { font-size:78px; animation:pop .5s; filter:drop-shadow(0 8px 16px rgba(255,179,64,.4)); }
  .complete .gotstars { filter:drop-shadow(0 4px 10px rgba(255,179,64,.5)); }
  @keyframes pop { 0%{transform:scale(0);} 70%{transform:scale(1.25);} 100%{transform:scale(1);} }
  .complete h2 { font-size:28px; margin:10px 0; }
  .complete .gotstars { font-size:46px; letter-spacing:6px; margin:8px 0; }
  .complete p { font-size:18px; margin:6px 0 20px; }
  .unlock-banner { background:linear-gradient(180deg,#fffbe9,#fff3d1); border:2px dashed #ffb340;
    color:#b06c00; border-radius:18px; padding:12px 16px; margin:12px auto; font-size:16px;
    max-width:320px; box-shadow:0 8px 20px rgba(255,179,64,.25), inset 0 1px 0 #ffffff; }

  .conf { position:fixed; top:-20px; width:10px; height:14px; z-index:50; pointer-events:none;
    animation:fall linear forwards; }
  @keyframes fall { to { transform:translateY(110vh) rotate(720deg); } }

  @media (max-width:480px){
    .node-row:nth-child(odd){ transform:translateX(-58px); }
    .node-row:nth-child(even){ transform:translateX(58px); }
    .visual{ font-size:28px; }
  }

  /* ---------- boot splash ---------- */
  #splash {
    position:fixed; inset:0; z-index:200; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px;
    background:linear-gradient(180deg,#0d0b30,#3d2380);
    transition:opacity .4s;
  }
  #splash.bye { opacity:0; pointer-events:none; }
  #splash img { width:112px; height:112px; border-radius:26px;
    box-shadow:0 20px 50px rgba(0,0,0,.5); animation:popIn .5s var(--ease-enter) both; }
  #splash .t { font-weight:1000; font-size:21px; letter-spacing:.4px;
    animation:popIn .5s var(--ease-enter) .12s both; }

  /* ---------- touch ripple ---------- */
  .rippleFx { position:fixed; width:16px; height:16px; border-radius:50%; z-index:150;
    background:rgba(255,255,255,.35); pointer-events:none;
    transform:translate(-50%,-50%); animation:rippleA .45s ease-out forwards; }
  @keyframes rippleA { to { transform:translate(-50%,-50%) scale(6); opacity:0; } }

  /* ---------- staggered items in task visuals ---------- */
  .visual .grp span, .visual .coin { display:inline-block; animation:itemIn .28s var(--ease-enter) both; }
  @keyframes itemIn { from { opacity:0; transform:scale(.3); } }

  /* ---------- level-complete celebration ---------- */
  .gotstars .gstar { display:inline-block; animation:starPop .55s var(--ease-enter) both; }
  .gotstars .gstar.dim { filter:grayscale(1); opacity:.35; }
  @keyframes starPop {
    0% { opacity:0; transform:scale(0) rotate(-40deg); }
    60% { transform:scale(1.35) rotate(8deg); }
    100% { opacity:1; transform:scale(1) rotate(0); }
  }

  /* ---------- per-world node palettes (done=gold, locked=gray win below) ---------- */
  .w0 .node { background:radial-gradient(circle at 30% 25%,#7ede97,#2fae5c); box-shadow:0 8px 0 #1e7f41, 0 14px 28px rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.3); }
  .w1 .node { background:radial-gradient(circle at 30% 25%,#a8b4d4,#66789f); box-shadow:0 8px 0 #4a5875, 0 14px 28px rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.3); }
  .w2 .node { background:radial-gradient(circle at 30% 25%,#f5b26b,#d67b2f); box-shadow:0 8px 0 #a05a1e, 0 14px 28px rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.3); }
  .w3 .node { background:radial-gradient(circle at 30% 25%,#6cc0ee,#2f86c8); box-shadow:0 8px 0 #226397, 0 14px 28px rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.3); }
  .w4 .node { background:radial-gradient(circle at 30% 25%,#cf95e6,#9a4fc7); box-shadow:0 8px 0 #713695, 0 14px 28px rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.3); }
  .w5 .node { background:radial-gradient(circle at 30% 25%,#8b95f0,#525ecc); box-shadow:0 8px 0 #3b449c, 0 14px 28px rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.3); }
  .world .node.done { background:radial-gradient(circle at 30% 25%,#ffd76e,#ff9f40);
    box-shadow:0 8px 0 #d97b1e, 0 14px 28px rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.35); }
  .world .node.locked { background:radial-gradient(circle at 30% 25%,#9a9ab0,#5c5c74);
    box-shadow:0 8px 0 #44445a; }
  .world .node:active { transform:translateY(3px) scale(.98); }

  /* lucide icon buttons */
  .btn-close, .gc-close, .say-btn { display:flex; align-items:center; justify-content:center; }
  .btn-close svg, .gc-close svg { width:18px; height:18px; }
  .say-btn { color:#5a34c9; }
  .say-btn svg { width:20px; height:20px; }

  /* ---------- accessibility ---------- */
  button:focus-visible, .node:focus-visible, [role="button"]:focus-visible, a:focus-visible {
    outline:3px solid #ffd76e; outline-offset:2px;
  }
  @media (prefers-reduced-motion: reduce){
    /* decorative loops off; feedback stays */
    .bg-star, .star-drift, .shoot, .rocket-marker, .speaker.talking,
    .streak-flame, .daily-claim { animation:none !important; }
    .node.current::after { animation:none; transform:scale(1); opacity:.65; }
    .intro-scene.evil.revealing .bubble,
    .intro-scene.evil.revealing .speaker,
    .intro-scene.evil.revealing .btn-next { animation:none; }
    .conf { display:none; }
    .fly-away, .intro-scene .speaker.fly-away, .intro-scene .speaker-npc.fly-away {
      animation:flyFade 1s forwards !important; }
    #app.screen-in, .intro-scene .speaker, .intro-scene .speaker-img,
    .intro-scene .bubble, .xpbar > div::after, .nav-btn .ic { animation:none !important; transition:none !important; }
    .speaker-npc:not(.fly-away) { animation:none !important; }
    .visual .grp span, .visual .coin, .gotstars .gstar, .rippleFx,
    #splash img, #splash .t, .fb-ava { animation:none !important; }
  }
  @keyframes flyFade { to { opacity:0; } }
</style>
</head>
<body>
<div id="app"></div>
<div id="splash"><img src="icons/icon-192.png" alt=""><div class="t">Космоматематика</div></div>
<script>
'use strict';

/* ================= state ================= */
const SAVE_KEY = 'kosmomath_v2';
const DEFAULT_NAMES = { f:{ru:'Ника', en:'Nika'}, m:{ru:'Даня', en:'Danya'} };
let state = { xp:0, levelStars:{}, char:{ g:'f', name:'Ника' }, sound:true, intros:{}, lang:'ru' };
try {
  const s = localStorage.getItem(SAVE_KEY);
  if (s) state = JSON.parse(s);
  else {
    const old = localStorage.getItem('kosmomath_v1');   // migrate char/sound/xp from v1
    if (old){ const o = JSON.parse(old);
      if (o.char) state.char = o.char;
      if (o.sound !== undefined) state.sound = o.sound;
      if (o.xp) state.xp = o.xp; }
  }
} catch(e){}
if (!state.char) state.char = { g:'f', name:'Ника' };
if (state.sound === undefined) state.sound = true;
if (!state.intros) state.intros = {};
if (!state.outros) state.outros = {};
if (!state.lang) state.lang = 'ru';
if (state.voice === undefined) state.voice = true;
if (!state.stats) state.stats = { tasks:0, perfect:0 };
if (!state.ach) state.ach = {};
function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){} }

/* i18n helpers */
const LANG = ()=> state.lang || 'ru';
const tr = (ru, en)=> LANG()==='en' ? en : ru;

/* character helpers */
const N  = ()=> state.char.name;
const T  = ()=> state.char.g==='f' ? tr('Астрокошка','Astrocat') : tr('Космокот','Cosmocat');
const AV = ()=> state.char.g==='f' ? '😺' : '🐱';
const vb = (m,f)=> state.char.g==='f' ? f : m;          // player verb (ru only)
const nvb = (npc,m,f)=> npc.g==='f' ? f : m;            // NPC verb (ru only)
const hn = c => c.h.n[LANG()];                          // helper NPC name
const vn = c => c.v.n[LANG()];                          // villain NPC name

/* ~3500 XP available across all 50 levels (70 XP per perfect level) —
   admiral requires nearly the whole galaxy, not just the first world */
const RANKS = [
  [0,{ru:'Юнга',en:'Cadet'},'⚓'],
  [300,{ru:'Пилот-стажёр',en:'Trainee Pilot'},'🎖️'],
  [800,{ru:'Пилот',en:'Pilot'},'🚀'],
  [1500,{ru:'Штурман',en:'Navigator'},'🧭'],
  [2400,{ru:'Капитан',en:'Captain'},'⭐'],
  [3400,{ru:'Адмирал Галактики',en:'Galaxy Admiral'},'👑']
];
function rankInfo(){
  let i = 0;
  while (i+1 < RANKS.length && state.xp >= RANKS[i+1][0]) i++;
  const cur = RANKS[i], next = RANKS[i+1];
  return { idx:i, name:cur[1][LANG()], icon:cur[2],
    pct: next ? Math.round(100*(state.xp-cur[0])/(next[0]-cur[0])) : 100,
    next: next ? { xp:next[0], name:next[1][LANG()] } : null };
}

/* character art: characters/web/{Nika|Kogot}_{rank}_3d.png */
const RANK_FILES = ['01_Cadet','02_Trainee_Pilot','03_Pilot','04_Navigator','05_Captain','06_Galaxy_Admiral'];
function charImg(g, ri){
  return 'characters/web/'+(g==='f'?'Nika':'Kogot')+'_'+RANK_FILES[ri]+'_3d.png';
}
/* NPC portraits: characters/web/npc_{world}_{h|v}_3d.png (emoji fallback on error) */
function npcImg(wi, kind){ return 'characters/web/npc_'+(wi+1)+'_'+kind+'_3d.png'; }
function totalStars(){ return Object.values(state.levelStars).reduce((a,b)=>a+b,0); }

/* ================= sounds (WebAudio) ================= */
let actx = null;
function beep(freq, dur, delay, type, vol){
  if (!state.sound) return;
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    const t = actx.currentTime + (delay||0);
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + dur + 0.05);
  } catch(e){}
}
const sndClick   = ()=> beep(700, .06, 0, 'square', .04);
const sndCorrect = ()=> [523,659,784].forEach((f,i)=> beep(f, .15, i*0.09, 'triangle', .12));
const sndWrong   = ()=> beep(150, .3, 0, 'sawtooth', .06);
const sndWin     = ()=> [523,659,784,1047,1319].forEach((f,i)=> beep(f, .2, i*0.11, 'triangle', .12));
function toggleSound(){
  state.sound = !state.sound; save();
  if (state.sound) sndClick();
  const f = document.getElementById('soundFab');
  if (f) f.innerHTML = state.sound ? ICONS.soundOn : ICONS.soundOff;
}

/* ================= speech (TTS, Web Speech API) ================= */
let ttsVoices = [];
(function initTTS(){
  if (!('speechSynthesis' in window)) return;
  const load = ()=>{ ttsVoices = speechSynthesis.getVoices(); };
  load();
  speechSynthesis.onvoiceschanged = load;
})();
function voiceFor(){
  const p = LANG()==='en' ? 'en' : 'ru';
  return ttsVoices.find(v=> v.lang && v.lang.toLowerCase().indexOf(p)===0) || null;
}
function ttsOk(){ return !!voiceFor() && state.voice; }
function cleanForSpeech(html){
  return html
    .replace(/<[^>]*>/g,' ')                                        // strip tags
    .replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE0F}\u{200D}\u{2764}]/gu,'') // strip emoji
    .replace(/[«»]/g,'')
    .replace(/\s+/g,' ').trim();
}
function speak(html, force){
  if (!state.voice) return;
  const v = voiceFor();
  if (!v) return;
  if (!force && !state.sound) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(cleanForSpeech(html));
    u.voice = v; u.lang = LANG()==='en' ? 'en-US' : 'ru-RU'; u.rate = 0.95; u.pitch = 1.05;
    speechSynthesis.speak(u);
  } catch(e){}
}
function stopSpeech(){ try{ if ('speechSynthesis' in window) speechSynthesis.cancel(); }catch(e){} }
function sayTask(){ if (cur) speak(cur.tasks[cur.idx].prompt, true); }

/* ================= helpers ================= */
const reducedMotion = ()=> !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
const rnd = (a,b)=> a + Math.floor(Math.random()*(b-a+1));
const pick = arr => arr[rnd(0,arr.length-1)];
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]];} return a; }
function plural(n, f){ n=Math.abs(n)%100; const d=n%10;
  if(n>10&&n<20) return f[2]; if(d>1&&d<5) return f[1]; if(d===1) return f[0]; return f[2]; }
function em(e,n,cls){
  let s='';
  for(let i=0;i<n;i++)
    s+='<span class="'+(cls||'')+'" style="animation-delay:'+(i*35)+'ms">'+e+'</span> ';
  return s;
}
function emRows(e,n){ // rows of 5 so counting big numbers is easier
  let s='';
  for(let i=0;i<n;i++){
    s+='<span style="animation-delay:'+(i*35)+'ms">'+e+'</span> ';
    if((i+1)%5===0 && i+1<n) s+='<br>';
  }
  return s;
}

const ITEMS = [
  {e:'🚀', f:['ракета','ракеты','ракет'], en:['rocket','rockets']},
  {e:'⭐', f:['звезда','звезды','звёзд'], en:['star','stars']},
  {e:'🪐', f:['планета','планеты','планет'], en:['planet','planets']},
  {e:'☄️', f:['комета','кометы','комет'], en:['comet','comets']},
  {e:'👽', f:['инопланетянин','инопланетянина','инопланетян'], en:['alien','aliens']},
  {e:'🛸', f:['тарелка','тарелки','тарелок'], en:['saucer','saucers']},
  {e:'🍩', f:['космопончик','космопончика','космопончиков'], en:['space donut','space donuts']},
  {e:'🤖', f:['робот','робота','роботов'], en:['robot','robots']},
];
/* word for "n items" and "many items" in the current language */
const wordFor = (n, it)=> LANG()==='en' ? (n===1 ? it.en[0] : it.en[1]) : plural(n, it.f);
const manyOf  = it => LANG()==='en' ? it.en[1] : it.f[2];

const PRAISE = {
  ru:['Отлично! 🎉','Космически! 🚀','Супер! ⭐','Молодец! 💫','Верно! 🛸','Ты звезда! 🌟'],
  en:['Great job! 🎉','Cosmic! 🚀','Super! ⭐','Well done! 💫','Correct! 🛸','You are a star! 🌟']
};
const RETRY = {
  ru:['Попробуй ещё раз! 💪','Почти! Подумай ещё 🤔','Не сдавайся! 🚀'],
  en:['Try again! 💪','Almost! Think again 🤔','Don’t give up! 🚀']
};
const QUOTES = {
  ru:[
    'Каждая решённая задача — новая звезда на твоём небе!',
    'Настоящие капитаны не боятся трудных примеров!',
    'Умение считать — это суперсила!',
    'Ошибки — это ступеньки к победе!',
    'Кто тренируется — тот побеждает!',
    'Смелость и математика откроют любую дверь!'
  ],
  en:[
    'Every solved problem is a new star in your sky!',
    'Real captains are not afraid of tricky problems!',
    'Knowing how to count is a superpower!',
    'Mistakes are steps to victory!',
    'Practice makes champions!',
    'Courage and math will open any door!'
  ]
};

/* ================= task generators =================
   task = { prompt, visual, kind:'choice'|'input', options?, answer }
   c = world cast: { h:{n,e,g}, v:{n,e,g} } */

function genCount(max, kind){
  const it = pick(ITEMS);
  const n = rnd(2, max);
  const t = {
    prompt:tr('Сосчитай! Сколько здесь '+it.f[2]+'?',
              'Count! How many '+it.en[1]+' are here?'),
    visual:'<div class="grp">'+em(it.e,n)+'</div>',
    kind, answer:String(n)
  };
  if (kind==='choice'){
    const opts = new Set([n]);
    while (opts.size<4) opts.add(Math.max(1, n+rnd(-3,3)));
    t.options = shuffle([...opts]).map(String);
  }
  return t;
}

function genCompare(lo, hi){
  lo = lo||1; hi = hi||9;
  let a = rnd(lo,hi), b = rnd(lo,hi);
  if (Math.random()<0.2) b = a;
  const i1 = pick(ITEMS); let i2 = pick(ITEMS);
  while (i2===i1) i2 = pick(ITEMS);
  return {
    prompt:tr('Сравни количество! Выбери правильный знак.',
              'Compare the amounts! Choose the correct sign.'),
    visual:'<div class="grp">'+emRows(i1.e,a)+'</div><span class="op">?</span><div class="grp">'+emRows(i2.e,b)+'</div>',
    kind:'choice', options:['>','<','='],
    answer: a>b ? '>' : (a<b ? '<' : '=')
  };
}

function genBonds(c, maxTotal){
  const total = rnd(4, maxTotal||10), p = rnd(1,total-1);
  return {
    prompt:tr(c.h.e+' '+hn(c)+' просит помощи: какое число спряталось?',
              c.h.e+' '+hn(c)+' needs help: which number is hiding?'),
    visual:'<span class="bignum">'+total+' = '+p+' + </span><span class="gap">?</span>',
    kind:'input', answer:String(total-p)
  };
}

function genAdd(max, c){
  const a = rnd(1,6), b = rnd(1, Math.max(1, max-a));
  const it = pick(ITEMS);
  const tpl = LANG()==='en' ? pick([
    N()+' and '+hn(c)+' found '+a+' '+wordFor(a,it)+', and then '+b+' more. How many in total?',
    N()+' collected '+a+' '+wordFor(a,it)+'. '+c.h.e+' '+hn(c)+' brought '+b+' more. How many now?',
    'In the morning '+N()+' found '+a+' '+wordFor(a,it)+', and in the evening — '+b+' more. How many in total?'
  ]) : pick([
    N()+' и '+hn(c)+' нашли '+a+' '+plural(a,it.f)+', а потом ещё '+b+'. Сколько всего?',
    N()+' '+vb('собрал','собрала')+' '+a+' '+plural(a,it.f)+'. '+c.h.e+' '+hn(c)+' '+nvb(c.h,'принёс','принесла')+' ещё '+b+'. Сколько стало?',
    'Утром '+N()+' '+vb('нашёл','нашла')+' '+a+' '+plural(a,it.f)+', а вечером — ещё '+b+'. Сколько всего?'
  ]);
  return {
    prompt:tpl,
    visual:'<div class="grp">'+em(it.e,a)+'</div><span class="op">+</span><div class="grp">'+em(it.e,b)+'</div>',
    kind:'input', answer:String(a+b)
  };
}

function genSub(c, maxA){
  const a = rnd(3, maxA||10), b = rnd(1,a-1);
  const it = pick(ITEMS);
  const tpl = LANG()==='en' ? pick([
    N()+' took '+a+' '+wordFor(a,it)+' on the flight. '+b+' went to friends. How many are left?',
    'There were '+a+' '+wordFor(a,it)+' in orbit. '+b+' flew home. How many are left?',
    'There were '+a+' '+wordFor(a,it)+'. '+c.h.e+' '+hn(c)+' took '+b+'. How many are left?'
  ]) : pick([
    N()+' '+vb('взял','взяла')+' в полёт '+a+' '+plural(a,it.f)+'. '+b+' '+vb('он отдал','она отдала')+' друзьям. Сколько осталось?',
    'На орбите летало '+a+' '+plural(a,it.f)+'. '+b+' улетели домой. Сколько осталось?',
    'Было '+a+' '+plural(a,it.f)+'. '+c.h.e+' '+hn(c)+' '+nvb(c.h,'забрал','забрала')+' '+b+' себе. Сколько осталось?'
  ]);
  return {
    prompt:tpl,
    visual:'<div class="grp">'+em(it.e,a-b)+em(it.e,b,'gone')+'</div>',
    kind:'input', answer:String(a-b)
  };
}

function genStory(c, k){
  const kind = k||rnd(1,3);
  if (kind===1){
    const need = rnd(8,12), a = rnd(1,5), b = rnd(1,5), d = rnd(1,5);
    const YES = tr('Да','Yes'), NO = tr('Нет','No');
    return {
      prompt:tr(
        T()+' '+N()+' готовится к прыжку в гиперпространство! Для прыжка нужно '+need+
        ' энерго-ячеек. В двигателе уже '+a+', в хранилище '+b+' и ещё '+d+' на складе. Хватит ли энергии для прыжка?',
        T()+' '+N()+' is getting ready for a hyperspace jump! The ship needs '+need+
        ' energy cells. There are already '+a+' in the engine, '+b+' in storage and '+d+' more in the warehouse. Is there enough energy for the jump?'),
      visual:'<div class="grp">'+em('🔋',a)+'</div><span class="op">+</span><div class="grp">'+em('🔋',b)+
        '</div><span class="op">+</span><div class="grp">'+em('🔋',d)+'</div>',
      kind:'choice', options:[YES,NO], answer: (a+b+d>=need)?YES:NO
    };
  }
  if (kind===2){
    const a = rnd(1,4), b = rnd(1,3), d = rnd(1,3);
    const it = pick([ITEMS[1],ITEMS[3],ITEMS[6]]);
    return {
      prompt:tr(
        N()+' собирает звёздное топливо! Утром '+vb('он нашёл','она нашла')+' '+a+' '+plural(a,it.f)+
        ', днём — '+b+', а вечером — ещё '+d+'. Сколько всего получилось?',
        N()+' is collecting star fuel! In the morning: '+a+' '+wordFor(a,it)+
        ', in the afternoon — '+b+', and in the evening — '+d+' more. How many in total?'),
      visual:'<div class="grp">'+em(it.e,a)+'</div><span class="op">+</span><div class="grp">'+em(it.e,b)+
        '</div><span class="op">+</span><div class="grp">'+em(it.e,d)+'</div>',
      kind:'input', answer:String(a+b+d)
    };
  }
  const a = rnd(5,10), b = rnd(1,4);
  return {
    prompt:tr(

/* --- Планета роботов --- */
function genSeq(steps, dir){
  const d = pick(steps||[1,2]);
  const asc = dir==='desc' ? false : (dir==='asc' ? true : Math.random()<0.7);
  let start = asc ? rnd(0, 20-4*d) : rnd(4*d, 20);
  const seq = [];
  for (let i=0;i<4;i++) seq.push(asc ? start+d*i : start-d*i);
  const ans = asc ? start+d*4 : start-d*4;
  const opts = new Set([ans]);
  while (opts.size<4) opts.add(Math.max(0, ans+rnd(-3,3)));
  return {
    prompt:tr('Роботы печатают числа по порядку. Какое число будет следующим?',
              'The robots are printing numbers in order. Which number comes next?'),
    visual:'<span class="bignum">'+seq.join(', ')+', </span><span class="gap">?</span>',
    kind:'choice', options:shuffle([...opts]).map(String), answer:String(ans)
  };
}
function genShapePattern(pl){
  const shapes = shuffle(['🔴','🔵','🟡','🟢','🔺','🟣','⬛','⭐']);
  const p = shapes.slice(0, pick(pl||[2,3]));
  const len = 6;
  let seq = '';
  for (let i=0;i<len;i++) seq += '<span style="animation-delay:'+(i*45)+'ms">'+p[i%p.length]+'</span>';
  const ans = p[len%p.length];
  const opts = shuffle(p.concat(shapes[p.length]).slice(0,4));
  return {
    prompt:tr('Робот-художник рисует узор. Какая фигура будет следующей?',
              'The robot artist is drawing a pattern. Which shape comes next?'),
    // single non-wrapping row so the «?» sits exactly where the next shape goes
    visual:'<div class="grp seq-row">'+seq+'<span class="gap" style="animation-delay:'+(len*45)+'ms">?</span></div>',
    kind:'choice', options:opts, answer:ans
  };
}
function genOddOne(){
  const cats = [
    ['🍎','🍐','🍌','🍇','🍓'],
    ['🐱','🐶','🐰','🦊','🐻'],
    ['🚗','🚀','🚂','✈️','🚁'],
    ['⚽','🏀','🎾','🏐','⚾'],
  ];
  const ci = rnd(0,cats.length-1);
  let oi = rnd(0,cats.length-1); while (oi===ci) oi = rnd(0,cats.length-1);
  const three = shuffle(cats[ci]).slice(0,3);
  const odd = pick(cats[oi]);
  const opts = shuffle(three.concat(odd));
  return {
    prompt:tr('Робот-сортировщик запутался! Что здесь лишнее?',
              'The sorting robot got confused! Which one doesn’t belong?'),
    visual:'<div class="grp" style="font-size:40px">'+opts.join(' ')+'</div>',
    kind:'choice', options:opts, answer:odd
  };
}

/* --- Туманность времени --- */
const HOUR = { f:['час','часа','часов'], en:['hour','hours'] };
function genClock(mode){
  if (mode==='back'){
    const h = rnd(4,11), d = rnd(1,3);
    return {
      prompt:tr('Часы показывают '+h+' '+plural(h,HOUR.f)+'. Сколько было '+d+' '+plural(d,HOUR.f)+' назад?',
                'The clock shows '+h+'. What time was it '+d+' '+wordFor(d,HOUR)+' ago?'),
      visual:'<span style="font-size:56px">🕐</span><br><span class="bignum">'+h+' − '+d+' = </span><span class="gap">?</span>',
      kind:'input', answer:String(h-d)
    };
  }
  const h = rnd(1,9), d = mode==='fwd1' ? 1 : rnd(2,3);
  return {
    prompt:tr('Часы показывают '+h+' '+plural(h,HOUR.f)+'. Сколько будет через '+d+' '+plural(d,HOUR.f)+'?',
              'The clock shows '+h+'. What time will it be in '+d+' '+wordFor(d,HOUR)+'?'),
    visual:'<span style="font-size:56px">🕐</span><br><span class="bignum">'+h+' + '+d+' = </span><span class="gap">?</span>',
    kind:'input', answer:String(h+d)
  };
}
function genDays(mode){
  const DAYS = LANG()==='en'
    ? ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday']
    : ['понедельник','вторник','среда','четверг','пятница','суббота','воскресенье'];
  const i = rnd(0,6);
  const tomorrow = mode==='tomorrow' ? true : mode==='yesterday' ? false : Math.random()<0.6;
  const ans = tomorrow ? DAYS[(i+1)%7] : DAYS[(i+6)%7];
  const opts = new Set([ans]);
  while (opts.size<3) opts.add(DAYS[rnd(0,6)]);
  return {
    prompt:tr('Сегодня '+DAYS[i]+'. Какой день '+(tomorrow?'будет завтра':'был вчера')+'?',
              'Today is '+DAYS[i]+'. What day '+(tomorrow?'will it be tomorrow':'was it yesterday')+'?'),
    visual:'<span style="font-size:56px">📅</span>',
    kind:'choice', options:shuffle([...opts]), answer:ans
  };
}
function genMoney(c, cnts){
  const denoms = [1,2,5,10];
  const cnt = pick(cnts||[2,2,3]);
  let coins, sum;
  do {
    coins = []; sum = 0;
    for (let i=0;i<cnt;i++){ const d = pick(denoms); coins.push(d); sum += d; }
  } while (sum > 20);
  return {
    prompt:tr(c.h.e+' '+hn(c)+' даёт монетки на космо-мороженое. Сколько всего монеток получилось?',
              c.h.e+' '+hn(c)+' gives you coins for space ice cream. How much is it in total?'),
    visual:coins.map((d,i)=>'<span class="coin" style="animation-delay:'+(i*90)+'ms">'+d+'</span>').join(''),
    kind:'input', answer:String(sum)
  };
}

/* ================= parallax background stars ================= */
const starLayers = [];
(function(){
  // [parallax factor, star count, min size, drift duration s]
  const cfg = [
    [0.14, 14, 1.8, 70],   // near: bigger, moves most
    [0.07, 15, 1.2, 100],  // mid
    [0.03, 14, 0.8, 140],  // far: tiny, almost still
  ];
  cfg.forEach(([k, count, minSz, dur])=>{
    const layer = document.createElement('div');
    layer.className = 'star-layer';
    const drift = document.createElement('div');
    drift.className = 'star-drift';
    drift.style.animationDuration = dur+'s';
    for (let i=0;i<count;i++){
      const s = document.createElement('div');
      s.className = 'bg-star';
      const sz = minSz + Math.random()*1.6;
      s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+
        Math.random()*100+'%;animation-delay:'+(Math.random()*3)+'s;animation-duration:'+
        (2.5+Math.random()*2)+'s;';
      drift.appendChild(s);
    }
    layer.appendChild(drift);
    document.body.appendChild(layer);
    starLayers.push({ el:layer, k, drift });
  });
  // occasional shooting stars in the middle layer
  const mid = starLayers[1].drift;
  for (let i=0;i<2;i++){
    const sh = document.createElement('div');
    sh.className = 'shoot';
    sh.style.cssText = 'top:'+rndf(4,28)+'%;left:'+rndf(45,92)+'%;'+
      'animation-duration:'+rndf(14,22)+'s;animation-delay:'+rndf(3,12)+'s;';
    mid.appendChild(sh);
  }
  function rndf(a,b){ return (a+Math.random()*(b-a)).toFixed(1); }
  let ticking = false;
  window.addEventListener('scroll', ()=>{
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(()=>{
      const y = window.scrollY || 0;
      if (!reducedMotion())
        starLayers.forEach(l=> l.el.style.transform = 'translateY('+(-y*l.k)+'px)');
      updateHeroMini(y);
      ticking = false;
    });
  }, { passive:true });
})();

  if (!s) return false;
  const p = s.split('-').map(Number);
  const then = new Date(p[0], p[1]-1, p[2]);
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((today0 - then) / 86400000) === 1;
}
function ensureDaily(){
  const t = todayStr();
  if (!state.daily || state.daily.date !== t)
    state.daily = { date:t, tasks:0, firstTry:0, levels:0, practice:0, claimed:false };
  if (!state.streak) state.streak = { count:0, last:'', best:0 };
  if (!state.playDays) state.playDays = [];
  if (state.streak.last && !state.playDays.includes(state.streak.last))
    state.playDays.push(state.streak.last);
}
const MISSIONS = [
  { id:'tasks',    target:10, icon:'🧮', ru:'Реши 10 задач',                 en:'Solve 10 problems' },
  { id:'firstTry', target:5,  icon:'🎯', ru:'Реши 5 задач с первой попытки', en:'Solve 5 problems on the first try' },
  { id:'levels',   target:2,  icon:'🚀', ru:'Пройди 2 уровня',               en:'Finish 2 levels' },
  { id:'practice', target:1,  icon:'🔁', ru:'Заверши одно повторение',       en:'Finish one practice session' },
];
function todaysMission(){
  ensureDaily();
  let h = 0;
  for (const ch of state.daily.date) h += ch.charCodeAt(0);
  return MISSIONS[h % MISSIONS.length];
}
function missionProgress(){
  const m = todaysMission();
  return Math.min(state.daily[m.id]||0, m.target);
}
function bumpDaily(key){ ensureDaily(); state.daily[key] = (state.daily[key]||0) + 1; }
function streakCurrent(){
  ensureDaily();
  const s = state.streak;
  return (s.last === todayStr() || isYesterday(s.last)) ? s.count : 0;
}
function updateStreak(){        // → true when today was just added to the streak
  ensureDaily();
  const t = todayStr(), s = state.streak;
  if (!state.playDays.includes(t)) state.playDays.push(t);
  state.playDays = state.playDays.slice(-21);
  if (s.last === t) return false;
  s.count = isYesterday(s.last) ? s.count + 1 : 1;
  s.last = t;
  s.best = Math.max(s.best||0, s.count);
  return true;
}

function enterSaveCode(){
  const code = prompt(tr('Вставь код спасения:','Paste the rescue code:'));
  if (!code) return;
  try {
    const s = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    if (typeof s.xp !== 'number' || !s.levelStars || !s.char) throw new Error('bad');
    state = s;
    if (!state.intros) state.intros = {};
    if (!state.outros) state.outros = {};
    if (!state.lang) state.lang = 'ru';
    if (state.sound === undefined) state.sound = true;
    save(); sndWin(); buildNav(); renderHome();
  } catch(e){
    alert(tr('Хм, код не подошёл. Проверь, что он скопирован целиком!',
             'Hmm, that code did not work. Make sure you copied all of it!'));
