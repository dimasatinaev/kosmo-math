/* Celeste-style speech blips: pitch depends on who is talking */
function blip(kind){
  const base = kind==='v' ? 200 : kind==='p' ? 620 : 900;   // villain low, player mid, helper high
  const f = base * (0.9 + Math.random()*0.2);
  beep(f, .045, 0, kind==='v' ? 'sawtooth' : 'square', .045);
}

function startReveal(text, kind){
  const evil = kind==='v';
  clearInterval(revealTimer);
  const el = document.getElementById('dlgText');
  if (!el) return;
  el._full = text;
  if (reducedMotion()){ el.textContent = text; finishReveal(); return; }   // instant text
  let i = 0;
  const total = text.length;
  const useBlips = !ttsOk();   // real voice off/unavailable → the text "speaks" in beeps
  revealTimer = setInterval(()=>{
    i++;
    if (i >= total){ finishReveal(); return; }
    if (useBlips && i%2===0 && /[^\s.,!?…«»—-]/.test(text[i]||'')) blip(kind);
    if (evil){
      // villain "mixes everything up": a scrambled tail decodes into the real text
      const tail = Math.min(total, i+6);
      let scr = '';
      for (let k=i;k<tail;k++)
        scr += text[k]===' ' ? ' ' : SCRAMBLE[Math.floor(Math.random()*SCRAMBLE.length)];
      el.textContent = text.slice(0,i) + scr;
    } else {
      el.textContent = text.slice(0,i);   // clean typewriter
    }
  }, evil ? 30 : 40);
}
function finishReveal(){
  clearInterval(revealTimer); revealTimer = null;
  const el = document.getElementById('dlgText');
  if (el && el._full !== undefined) el.textContent = el._full;
  const scene = document.getElementById('dlgScene');
  if (scene) scene.classList.remove('revealing');
  const sp = document.getElementById('dlgSpeaker');
  if (sp) sp.classList.remove('talking');
}
function bubbleTap(){
  if (revealTimer){ finishReveal(); return; }        // tap while typing → show all
  const nameEl = document.getElementById('dlgName');
  const el = document.getElementById('dlgText');
  if (nameEl && el) speak(nameEl.textContent+'. '+el.textContent, true);   // tap later → replay voice
}

function renderDialogScene(wi, li, idx, mode){
  setChrome('task');
  sndClick();
  const W = WORLDS[wi];
  const lines = (mode==='intro' ? W.intro : OUTROS[wi])[LANG()];
  const line = lines[idx];
  const evil = line[0]==='v';
  const whoName = line[0]==='h' ? hn(W.cast) : evil ? vn(W.cast) : T()+' '+N();
  const whoE = line[0]==='h' ? W.cast.h.e : evil ? W.cast.v.e : AV();
  const text = line[1].replace(/\{N\}/g, N());
  const last = idx === lines.length - 1;
  const dots = lines.map((_,i)=> '<i'+(i===idx?' class="on"':'')+'></i>').join('');
  const speaker = line[0]==='p'
    ? '<img class="speaker-img" id="dlgSpeaker" src="'+charImg(state.char.g, rankInfo().idx)+'" alt="">'
    : '<span class="speaker-wrap">'+
      '<img class="speaker-npc'+(evil?'':' talking')+'" id="dlgSpeaker" src="'+npcImg(wi, line[0])+'" alt="" '+
      'onerror="this.parentNode.innerHTML=\'<span class=&quot;speaker'+(evil?'':' talking')+'&quot; id=&quot;dlgSpeaker&quot;>'+whoE+'</span>\'">'+
      '</span>';
  const nextClick = last
    ? (mode==='intro' ? 'introDone('+wi+','+li+')' : 'outroDone('+wi+')')
    : 'renderDialogScene('+wi+','+li+','+(idx+1)+',\''+mode+'\')';
  const nextLabel = last
    ? (mode==='intro' ? tr('В путь! 🚀','Let’s go! 🚀') : tr('Прощай! 👋','Farewell! 👋'))
    : tr('Дальше ➜','Next ➜');
  app.innerHTML =
    (mode==='intro'
      ? '<div class="topbar"><button class="btn-close" aria-label="close" onclick="finishReveal();renderHome()">'+ICONS.x+'</button><div style="flex:1"></div></div>'
      : '')+
    '<div class="evilfx'+(evil?' on':'')+'"></div>'+
    '<div class="intro-scene'+(evil?' evil revealing':'')+'" id="dlgScene">'+
    '<div class="intro-world">'+W.icon+' '+W.name[LANG()]+(mode==='outro'?' ✨':'')+'</div>'+
    speaker+
    '<div class="bubble'+(evil?' villain':'')+'" onclick="bubbleTap()">'+
      '<span class="who" id="dlgName">'+whoName+
        (ttsOk()?'<span class="who-spk">'+ICONS.soundOn+'</span>':'')+'</span>'+
      '<span class="dlg-text" id="dlgText"></span></div>'+
    '<button class="btn-next" onclick="finishReveal();'+nextClick+'">'+nextLabel+'</button>'+
    '<div class="intro-dots">'+dots+'</div>'+
    '</div>';
  startReveal(text, line[0]);
  if (evil) beep(180,.25,0,'sawtooth',.05);
  speak(whoName+'. '+text);   // auto-read the dialog line (tap the bubble to replay)
}

/* ---------- world intro dialog ---------- */
function renderIntro(wi, li, idx){ renderDialogScene(wi, li, idx, 'intro'); }
function introDone(wi, li){ state.intros[wi] = true; save(); beginLevel(wi, li); }

/* ---------- world-clear outro ---------- */
function renderOutro(wi, idx){ renderDialogScene(wi, 0, idx, 'outro'); }
function outroDone(wi){
  state.outros[wi] = true; save();
  const W = WORLDS[wi];
  sndWin();
  confetti(); setTimeout(confetti, 600);
  app.innerHTML =
    '<div class="intro-scene">'+
    '<div class="intro-world">'+W.icon+' '+W.name[LANG()]+' ✨</div>'+
    '<span class="speaker-wrap">'+
    '<img class="speaker-npc fly-away" src="'+npcImg(wi,'v')+'" alt="" '+
      'onerror="this.parentNode.innerHTML=\'<span class=&quot;speaker fly-away&quot;>'+W.cast.v.e+'</span>\'">'+
    '</span>'+
    '<div class="char-sub" style="font-size:18px;margin-top:20px">'+
      tr(vn(W.cast)+' улетает всё дальше и дальше...', vn(W.cast)+' flies away, farther and farther...')+'<br>'+
      tr('Мир очищен! 🌟','World cleared! 🌟')+'</div>'+
    '</div>';
  setTimeout(renderHome, 2200);
}

/* ---------- level play ---------- */
let cur = null;

function startLevel(wi, li){
  sndClick();
  rememberMapScroll();
  if (!state.intros[wi] && WORLDS[wi].intro){ renderIntro(wi, li, 0); return; }
  beginLevel(wi, li);
}

function beginLevel(wi, li){
  const W = WORLDS[wi], L = W.levels[li];
  const tasks = [];
  for (let i=0;i<TASKS_PER_LEVEL;i++){
    const t = L.gen(W.cast);
    t._wi = wi;
    tasks.push(t);
  }
  if (L.boss){
    const v = W.cast.v;
    tasks[0].prompt = '<span class="villain">'+v.e+' <b>'+vn(W.cast)+'</b> '+
      tr(nvb(v,'преградил','преградила')+' путь: «Реши мои задачи — пропущу дальше!»',
         'blocks the way: “Solve my tasks and I will let you pass!”')+
      '</span><br><br>'+tasks[0].prompt;
  }
  cur = { wi, li, tasks, idx:0, mistakes:0, firstTry:true, input:'', rankBefore:rankInfo().name };
  renderTask();
}

function renderTask(){
  setChrome('task');
  const t = cur.tasks[cur.idx];
  cur.firstTry = true; cur.input = '';
  let answerArea = '';
  if (t.kind==='choice'){
    answerArea = '<div class="options">'+ t.options.map((o,i)=>
      '<button class="opt'+(String(o).length>3?' txt':'')+'" id="opt'+i+'" onclick="tryChoice('+i+')">'+o+'</button>').join('') +'</div>';
  } else {
    answerArea =
      '<div class="answer-display" id="disp">&nbsp;</div>'+
      '<div class="keypad">'+
      [1,2,3,4,5,6,7,8,9].map(d=>'<button class="key" onclick="kp(\''+d+'\')">'+d+'</button>').join('')+
      '<button class="key del" onclick="kp(\'del\')">⌫</button>'+
      '<button class="key" onclick="kp(\'0\')">0</button>'+
      '<button class="key act" onclick="kp(\'ok\')">✓</button>'+
      '</div>';
  }
  app.innerHTML =
    '<div class="topbar"><button class="btn-close" aria-label="close" onclick="renderHome()">'+ICONS.x+'</button>'+
    '<div class="progress"><div style="width:'+(100*cur.idx/TASKS_PER_LEVEL)+'%"></div></div></div>'+
    '<div class="card" id="card">'+
    (ttsOk() ? '<button class="say-btn" onclick="sayTask()" aria-label="'+tr('Прочитать вслух','Read aloud')+'" title="'+tr('Прочитать вслух','Read aloud')+'">'+ICONS.soundOn+'</button>' : '')+
    '<div class="prompt">'+t.prompt+'</div>'+
    '<div class="visual">'+t.visual+'</div>'+
    answerArea+
    '<div class="feedback" id="fb"></div>'+
    '<div id="nextArea"></div>'+
    '</div>';
}

/* NPC reaction portrait inside the feedback line */
function reactImg(kind, mood){
  const t = cur && cur.tasks && cur.tasks[cur.idx];
  const wi = (t && t._wi !== undefined) ? t._wi : (cur && cur.wi !== undefined ? cur.wi : 0);
  return '<img class="fb-ava '+mood+'" src="'+npcImg(wi, kind)+'" alt="" onerror="this.remove()">';
}

function tryChoice(i){
  const t = cur.tasks[cur.idx];
  const btn = document.getElementById('opt'+i);
  if (String(t.options[i]) === t.answer) correct(btn);
  else wrong(btn);
}

function kp(k){
  const disp = document.getElementById('disp');
  if (k!=='ok') sndClick();
  if (k==='del') cur.input = cur.input.slice(0,-1);
  else if (k==='ok'){
    if (!cur.input) return;
    if (cur.input === cur.tasks[cur.idx].answer) correct(null);
    else { wrong(null); cur.input=''; }
  }
  else if (cur.input.length<2) cur.input += k;
  if (disp) disp.textContent = cur.input || ' ';
}

function correct(btn){
  if (btn) btn.classList.add('right');
  document.querySelectorAll('.opt,.key').forEach(b=>b.style.pointerEvents='none');
  const gained = cur.firstTry ? 10 : 5;
  state.xp += gained;
  state.stats.tasks = (state.stats.tasks||0) + 1;
  bumpDaily('tasks');
  if (cur.firstTry) bumpDaily('firstTry');
  save();
  sndCorrect();
  const fb = document.getElementById('fb');
  fb.className = 'feedback good';
  fb.innerHTML = reactImg('h','happy') + pick(PRAISE[LANG()])+' +'+gained+' XP';
  confetti();
  document.getElementById('nextArea').innerHTML =
    '<button class="btn-next" onclick="nextTask()">'+
    (cur.idx+1<TASKS_PER_LEVEL ? tr('Дальше ➜','Next ➜') : tr('Финиш! 🏁','Finish! 🏁'))+'</button>';
}

function wrong(btn){
  if (btn) btn.classList.add('wrong');
  sndWrong();
  cur.mistakes++; cur.firstTry = false;
  const card = document.getElementById('card');
  card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
  const fb = document.getElementById('fb');
  fb.className = 'feedback bad';
  fb.innerHTML = reactImg('v','angry') + pick(RETRY[LANG()]);
  const disp = document.getElementById('disp');
  if (disp) disp.textContent = ' ';
}

function nextTask(){
  cur.idx++;
  if (cur.idx < TASKS_PER_LEVEL) renderTask();
  else if (cur.practice) finishPractice();
  else finishLevel();
}

function finishLevel(){
  const stars = cur.mistakes===0 ? 3 : (cur.mistakes<=2 ? 2 : 1);
  const bonus = 20;
  const worldsBefore = openWorldsCount();
  state.xp += bonus;
  state.levelStars[sKey(cur.wi,cur.li)] = Math.max(lvlStars(cur.wi,cur.li), stars);
  bumpDaily('levels');
  const streakNew = updateStreak();
  if (cur.mistakes === 0) state.stats.perfect = (state.stats.perfect||0) + 1;
  save();
  const newAch = checkAch();
  const newWorld = openWorldsCount() > worldsBefore
    ? WORLDS[openWorldsCount()-1] : null;
  const clearedNow = worldCleared(cur.wi) && !state.outros[cur.wi];
  const rankNow = rankInfo().name;
  const rankUp = rankNow !== cur.rankBefore;
  sndWin();
  confetti(); setTimeout(confetti, 500);
  setChrome('task');
  const starsHtml = Array.from({length:3}, (_,i)=>
    '<span class="gstar'+(i<stars?'':' dim')+'" style="animation-delay:'+(0.15+i*0.22)+'s">⭐</span>').join('');
  app.innerHTML =
    '<div class="card complete">'+
    '<div class="big">🏆</div>'+
    '<h2 style="color:#5a34c9">'+tr('Уровень пройден!','Level complete!')+'</h2>'+
    '<div class="gotstars">'+starsHtml+'</div>'+
    '<p><b id="xpTick" style="color:#1faf62">+0</b> '+tr('XP бонус за уровень!','XP level bonus!')+'<br>'+
      T()+' '+N()+' — '+tr('молодец!','well done!')+
      ' <img class="win-ava" src="'+charImg(state.char.g, rankInfo().idx)+'" alt="">🚀</p>'+
    (rankUp ? '<div class="unlock-banner"><img class="rankup-img" src="'+charImg(state.char.g, rankInfo().idx)+'" alt="">'+
      tr('🎖️ Ура! '+T()+' '+N()+' получает новый ранг: «<b>'+rankNow+'</b>»!',
         '🎖️ Hooray! '+T()+' '+N()+' earns a new rank: “<b>'+rankNow+'</b>”!')+
      '<br><small>'+pick(QUOTES[LANG()])+'</small></div>' : '')+
    (newWorld ? '<div class="unlock-banner">'+
      tr('🎉 Открыт новый мир: <b>'+newWorld.icon+' '+newWorld.name[LANG()]+'</b>!',
         '🎉 New world unlocked: <b>'+newWorld.icon+' '+newWorld.name[LANG()]+'</b>!')+'</div>' : '')+
    (clearedNow ? '<div class="unlock-banner">'+
      tr('🌟 Все звёзды мира собраны! Кажется, '+vn(WORLDS[cur.wi].cast)+' хочет что-то сказать...',
         '🌟 All the stars of this world are collected! Looks like '+vn(WORLDS[cur.wi].cast)+' has something to say...')+'</div>' : '')+
    (streakNew && streakCurrent()>1 ? '<div class="unlock-banner">'+
      tr('🔥 Серия: '+streakCurrent()+' '+plural(streakCurrent(),['день','дня','дней'])+' подряд!',
         '🔥 Streak: '+streakCurrent()+' days in a row!')+'</div>' : '')+
    (!state.daily.claimed && missionProgress()>=todaysMission().target ? '<div class="unlock-banner">'+
      tr('🎯 Миссия дня выполнена — забери награду на карте!',
         '🎯 Daily mission complete — claim your reward on the map!')+'</div>' : '')+
    achBanners(newAch)+
    (clearedNow
      ? '<button class="btn-next" onclick="renderOutro('+cur.wi+',0)">'+tr('Дальше ✨','Continue ✨')+'</button>'
      : '<button class="btn-next" onclick="renderHome()">'+tr('На карту 🗺️','To the map 🗺️')+'</button>')+
    '</div>';
  celebrate(stars, bonus);
}

/* star chimes + xp count-up on the victory screen */
function celebrate(stars, bonus){
  if (state.sound && !reducedMotion())
    for (let i=0;i<stars;i++)
      setTimeout(()=> beep(660+i*180, .18, 0, 'triangle', .12), 400+i*220);
  const el = document.getElementById('xpTick');
  if (!el) return;
  if (reducedMotion() || typeof requestAnimationFrame !== 'function'){
    el.textContent = '+'+bonus; return;
  }
  const t0 = Date.now(), dur = 700;
  setTimeout(function tick(){
    const t = Math.min(1, (Date.now()-t0)/dur);
    el.textContent = '+'+Math.round(bonus*t);
    if (t < 1) requestAnimationFrame(tick);
  }, 250);
}

syncDocLang();
renderHome();

/* preload character art so avatars and rank-ups appear instantly */
['f','m'].forEach(g=> RANK_FILES.forEach((_,i)=>{ const im = new Image(); im.src = charImg(g,i); }));
WORLDS.forEach((_,wi)=> ['h','v'].forEach(k=>{ const im = new Image(); im.src = npcImg(wi,k); }));

/* touch ripple */
document.addEventListener('pointerdown', e => {
  if (reducedMotion()) return;
  const r = document.createElement('span');
  r.className = 'rippleFx';
  r.style.left = e.clientX+'px';
  r.style.top = e.clientY+'px';
  document.body.appendChild(r);
  setTimeout(()=> r.remove(), 500);
}, { passive:true });

/* hide the boot splash once everything is on screen */
setTimeout(()=>{
  const s = document.getElementById('splash');
  if (s){ s.classList.add('bye'); setTimeout(()=> s.remove(), 450); }
}, 750);

/* ask the browser to keep our storage even under storage pressure */
if (navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(()=>{});

/* offline support (works when served over http/https, e.g. GitHub Pages) */
if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
